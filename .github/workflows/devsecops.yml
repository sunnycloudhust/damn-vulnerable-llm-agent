name: DevSecOps CI/CD Pipeline

# 1. Code Commit: Trigger khi có Push hoặc Pull Request vào nhánh chính
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-sast-sca:
    name: Build, SAST & SCA Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      # 2. Build: Cài đặt môi trường và dependencies
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3a. SAST: Quét mã nguồn tĩnh bằng Semgrep
      - name: Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
        # Mặc định Semgrep sẽ đánh fail pipeline nếu phát hiện lỗi High/Error

      # 3b. SAST: Phân tích chất lượng và bảo mật qua SonarQube Cloud
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Quality Gate của SonarCloud sẽ tự động đánh fail job này nếu không đạt tiêu chuẩn

      # 4. SCA: Kiểm tra lỗ hổng thư viện bằng Snyk
      # Chỉ chặn (fail) nếu phát hiện lỗ hổng mức độ HIGH hoặc CRITICAL
      - name: Snyk Dependency Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  dast-and-deploy:
    name: DAST Scan & Quality Gate
    needs: build-sast-sca 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python & Install Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      # Khởi động ứng dụng ngầm (Background) để lấy môi trường cho DAST quét
      - name: Run Application in Background
        run: |
          # Thay lệnh này bằng lệnh chạy server thực tế (VD: gunicorn, flask run, python main.py)
          nohup python main.py > app.log 2>&1 &
          sleep 10 # Đợi 10 giây để server kịp khởi động và lắng nghe port

      # 5. DAST: Quét ứng dụng đang chạy bằng OWASP ZAP
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000' # Cổng mặc định của ứng dụng
          fail_action: true # 6. Quality Gate: Đánh fail pipeline nếu ZAP tìm thấy rủi ro

      # NẾU TẤT CẢ CÁC BƯỚC TRÊN PASS ĐỀU XANH, MỚI THỰC HIỆN DEPLOY
      - name: Deploy to Staging/Production
        if: success()
        run: |
          echo "All Quality Gates passed. Proceeding with deployment..."
          # Thêm script deploy của bạn ở đây (VD: đẩy Docker image, rsync, SSH...)